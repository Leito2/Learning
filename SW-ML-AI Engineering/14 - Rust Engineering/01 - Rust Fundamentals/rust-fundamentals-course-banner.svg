<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Rust Fundamentals Course Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="55%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#glow)"/>

  <rect x="60" y="44" width="180" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="78" y="64" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="2" fill="#f97316">CURSO COMPRIMIDO</text>

  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="48" font-weight="800" fill="#fff">Rust Fundamentals</text>

  <rect x="60" y="148" width="240" height="4" rx="2" fill="url(#accent)"/>

  <text x="60" y="162" font-family="ui-sans-serif, system-ui" font-size="17" font-weight="500" fill="#cbd5e1">Ownership · borrowing · lifetimes · async</text>

  <text x="60" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8"># Memory-safe systems programming para ML infrastructure</text>

  <text x="60" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">fn </text>
    <text x="81" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">main() {</text>
    <text x="60" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">    let </text>
    <text x="116" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">name </text>
    <text x="151" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">= </text>
    <text x="165" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">&quot;World&quot;</text>
    <text x="214" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">;</text>
    <text x="60" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">    </text>
    <text x="88" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">println!</text>
    <text x="144" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">(&quot;Hello, {name}!&quot;);</text>
    <text x="60" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">}</text>

  <g transform="translate(1020,170)"><circle cx="60" cy="60" r="58" fill="url(#iconGrad)" stroke="rgba(255,255,255,0.18)"/><text x="60" y="78" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="40" font-weight="700" fill="#fff">Rs</text></g>

  <g><rect x="60" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="71" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">7 notas</text></g>
    <g><rect x="141" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="152" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">English</text></g>
    <g><rect x="222" y="304" width="99" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="233" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Memory-safe</text></g>
    <g><rect x="331" y="304" width="85" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="342" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Zero-cost</text></g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

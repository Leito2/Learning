<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Python Básico Course Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="55%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#glow)"/>

  <rect x="60" y="44" width="180" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="78" y="64" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="2" fill="#10b981">CURSO COMPRIMIDO</text>

  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="48" font-weight="800" fill="#fff">Python Básico</text>

  <rect x="60" y="148" width="240" height="4" rx="2" fill="url(#accent)"/>

  <text x="60" y="162" font-family="ui-sans-serif, system-ui" font-size="17" font-weight="500" fill="#cbd5e1">Tipos · control de flujo · funciones · módulos · OOP</text>

  <text x="60" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8"># El lenguaje canónico de IA/ML Engineer</text>

  <text x="60" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">def </text>
    <text x="88" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">saludar(nombre: str) -&gt; str:</text>
    <text x="60" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">    return </text>
    <text x="137" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">f'Hola, {nombre}!'</text>
    <text x="60" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">&gt;&gt;&gt; </text>
    <text x="88" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">saludar(&quot;Maria&quot;)</text>
    <text x="60" y="308" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">'Hola, Maria!'</text>

  <g transform="translate(1020,170)"><circle cx="60" cy="60" r="58" fill="url(#iconGrad)" stroke="rgba(255,255,255,0.18)"/><text x="60" y="78" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="40" font-weight="700" fill="#fff">Py</text></g>

  <g><rect x="60" y="304" width="78" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="71" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">13 notas</text></g>
    <g><rect x="148" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="159" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Español</text></g>
    <g><rect x="229" y="304" width="78" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="240" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Hands-on</text></g>
    <g><rect x="317" y="304" width="113" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="328" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">ML foundation</text></g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

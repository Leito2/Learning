<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="vLLM and Advanced RAG Course Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="55%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#glow)"/>

  <rect x="60" y="44" width="180" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="78" y="64" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="2" fill="#a78bfa">CURSO COMPRIMIDO</text>

  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="48" font-weight="800" fill="#fff">vLLM and Advanced RAG</text>

  <rect x="60" y="148" width="240" height="4" rx="2" fill="url(#accent)"/>

  <text x="60" y="162" font-family="ui-sans-serif, system-ui" font-size="17" font-weight="500" fill="#cbd5e1">PagedAttention · continuous batching · ColBERT · GraphRAG</text>

  <text x="60" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8"># High-throughput LLM serving + retrieval-augmented generation</text>

  <text x="60" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">from </text>
    <text x="95" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">vllm </text>
    <text x="130" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">import </text>
    <text x="179" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">LLM, SamplingParams</text>
    <text x="60" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">llm = </text>
    <text x="102" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">LLM(model=&quot;llama-3-70b&quot;)</text>
    <text x="60" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">params = </text>
    <text x="123" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">SamplingParams(temperature=0.7)</text>
    <text x="60" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">outputs = </text>
    <text x="130" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">llm.generate([&quot;Hello&quot;], params)</text>

  <g transform="translate(1020,170)"><circle cx="60" cy="60" r="58" fill="url(#iconGrad)" stroke="rgba(255,255,255,0.18)"/><text x="60" y="78" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="700" fill="#fff">vLLM</text></g>

  <g><rect x="60" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="71" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">7 notas</text></g>
    <g><rect x="141" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="152" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">English</text></g>
    <g><rect x="222" y="304" width="92" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="233" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Throughput</text></g>
    <g><rect x="324" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="335" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Serving</text></g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

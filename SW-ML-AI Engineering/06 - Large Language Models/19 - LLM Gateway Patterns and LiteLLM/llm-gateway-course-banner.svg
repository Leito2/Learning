<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="LLM Gateway Patterns and LiteLLM Course">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1426"/>
      <stop offset="55%" stop-color="#0e1b3a"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="codeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <marker id="aC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="aP" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <g transform="translate(60, 60)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" letter-spacing="3">CURSO COMPRIMIDO</text>
    <text x="0" y="66" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">LLM Gateway Patterns &amp; LiteLLM</text>
    <rect x="0" y="86" width="120" height="6" fill="url(#accent)" rx="3"/>
    <text x="0" y="130" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">Multi-Provider Abstraction, Routing, Observability</text>
    <text x="0" y="166" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">// LiteLLM · Router · Fallback · Cost Tracking · SSO</text>
  </g>

  <g transform="translate(60, 200)">
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600">
      <g transform="translate(0,0)">
        <rect width="80" height="30" rx="15" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.5"/>
        <text x="40" y="20" text-anchor="middle" fill="#7dd3fc">7 notas</text>
      </g>
      <g transform="translate(90,0)">
        <rect width="86" height="30" rx="15" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.5"/>
        <text x="43" y="20" text-anchor="middle" fill="#c4b5fd">English</text>
      </g>
      <g transform="translate(186,0)">
        <rect width="124" height="30" rx="15" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-opacity="0.5"/>
        <text x="62" y="20" text-anchor="middle" fill="#6ee7b7">Multi-Provider</text>
      </g>
      <g transform="translate(320,0)">
        <rect width="100" height="30" rx="15" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-opacity="0.5"/>
        <text x="50" y="20" text-anchor="middle" fill="#fcd34d">Production</text>
      </g>
    </g>
  </g>

  <g transform="translate(60, 260)">
    <rect width="1080" height="64" rx="10" fill="url(#codeBg)" stroke="#1e3a5f" stroke-width="1"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#e2e8f0">
      <text x="20" y="28"><tspan fill="#38bdf8">litellm</tspan> <tspan fill="#f472b6">--model</tspan> <tspan fill="#fbbf24">gpt-4o,claude,gemma</tspan></text>
      <text x="20" y="52"><tspan fill="#a78bfa">router</tspan>.<tspan fill="#34d399">add_fallback</tspan>([primary, secondary])</text>
    </g>
  </g>

  <g transform="translate(970, 60)">
    <g stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#aC)">
      <line x1="0" y1="40"  x2="60" y2="60"/>
      <line x1="0" y1="100" x2="60" y2="100"/>
      <line x1="0" y1="160" x2="60" y2="140"/>
    </g>
    <g stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#aP)">
      <line x1="170" y1="60"  x2="230" y2="40"/>
      <line x1="170" y1="100" x2="230" y2="100"/>
      <line x1="170" y1="140" x2="230" y2="160"/>
    </g>
    <g font-family="ui-monospace, monospace" font-size="9" font-weight="700">
      <rect x="0"  y="32"  width="36" height="16" rx="3" fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="1.2"/>
      <text x="18" y="44" text-anchor="middle" fill="#7dd3fc">GPT</text>
      <rect x="0"  y="92"  width="36" height="16" rx="3" fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="1.2"/>
      <text x="18" y="104" text-anchor="middle" fill="#7dd3fc">API</text>
      <rect x="0"  y="152" width="36" height="16" rx="3" fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="1.2"/>
      <text x="18" y="164" text-anchor="middle" fill="#7dd3fc">CLI</text>
      <rect x="194" y="32"  width="36" height="16" rx="3" fill="#a78bfa" fill-opacity="0.25" stroke="#a78bfa" stroke-width="1.2"/>
      <text x="212" y="44" text-anchor="middle" fill="#c4b5fd">o1</text>
      <rect x="194" y="92"  width="36" height="16" rx="3" fill="#a78bfa" fill-opacity="0.25" stroke="#a78bfa" stroke-width="1.2"/>
      <text x="212" y="104" text-anchor="middle" fill="#c4b5fd">4o</text>
      <rect x="194" y="152" width="36" height="16" rx="3" fill="#a78bfa" fill-opacity="0.25" stroke="#a78bfa" stroke-width="1.2"/>
      <text x="212" y="164" text-anchor="middle" fill="#c4b5fd">gem</text>
    </g>
    <g transform="translate(115, 100)">
      <polygon points="-40,0 0,-32 40,0 0,32" fill="url(#diamond)" stroke="#f8fafc" stroke-width="1.2"/>
      <polygon points="-22,0 0,-18 22,0 0,18" fill="#0c1426" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#f8fafc">LIT</text>
    </g>
    <text x="115" y="210" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#7dd3fc" letter-spacing="2">GATEWAY</text>
  </g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

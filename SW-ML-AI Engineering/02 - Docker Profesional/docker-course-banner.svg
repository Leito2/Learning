<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Bienvenida al Curso Docker Profesional">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1426"/>
      <stop offset="55%" stop-color="#0e1b3a"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0db7ed"/>
      <stop offset="50%" stop-color="#2496ed"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <linearGradient id="container1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <linearGradient id="container2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0db7ed"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <linearGradient id="container3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <linearGradient id="codeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.85" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#0db7ed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0db7ed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <g transform="translate(60, 60)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" letter-spacing="3">CURSO COMPRIMIDO</text>

    <text x="0" y="70" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="#f8fafc">Docker Profesional</text>

    <rect x="0" y="92" width="120" height="6" fill="url(#accent)" rx="3"/>

    <text x="0" y="140" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">De los fundamentos al despliegue en producción</text>

    <text x="0" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">// Dockerfile · Compose · Volúmenes · Redes · CI/CD</text>
  </g>

  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="1080" height="64" rx="10" fill="url(#codeBg)" stroke="#1e3a5f" stroke-width="1"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#e2e8f0">
      <text x="20" y="28"><tspan fill="#f472b6">FROM</tspan> <tspan fill="#7dd3fc">python:3.11-slim</tspan></text>
      <text x="20" y="52"><tspan fill="#a78bfa">COPY</tspan> <tspan fill="#fbbf24">.</tspan> <tspan fill="#fbbf24">/app</tspan> <tspan fill="#94a3b8">&amp;&amp;</tspan> <tspan fill="#a78bfa">CMD</tspan> <tspan fill="#fbbf24">["uvicorn", "main:app"]</tspan></text>
    </g>
  </g>

  <g transform="translate(60, 200)">
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600">
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="80" height="30" rx="15" fill="#0db7ed" fill-opacity="0.15" stroke="#0db7ed" stroke-opacity="0.5"/>
        <text x="40" y="20" text-anchor="middle" fill="#7dd3fc">7 notas</text>
      </g>
      <g transform="translate(90,0)">
        <rect x="0" y="0" width="86" height="30" rx="15" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.5"/>
        <text x="43" y="20" text-anchor="middle" fill="#c4b5fd">Español</text>
      </g>
      <g transform="translate(186,0)">
        <rect x="0" y="0" width="106" height="30" rx="15" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-opacity="0.5"/>
        <text x="53" y="20" text-anchor="middle" fill="#6ee7b7">Production-grade</text>
      </g>
      <g transform="translate(302,0)">
        <rect x="0" y="0" width="116" height="30" rx="15" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-opacity="0.5"/>
        <text x="58" y="20" text-anchor="middle" fill="#fcd34d">ML/AI ready</text>
      </g>
    </g>
  </g>

  <g transform="translate(950, 70)">
    <g>
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="80" height="50" rx="4" fill="url(#container1)" stroke="#60a5fa" stroke-width="1.5"/>
        <g stroke="#0c1426" stroke-width="1" opacity="0.4">
          <line x1="0" y1="12" x2="80" y2="12"/>
          <line x1="0" y1="25" x2="80" y2="25"/>
          <line x1="0" y1="38" x2="80" y2="38"/>
        </g>
        <circle cx="70" cy="6" r="3" fill="#34d399"/>
      </g>

      <g transform="translate(50, 30)">
        <rect x="0" y="0" width="80" height="50" rx="4" fill="url(#container2)" stroke="#0db7ed" stroke-width="1.5"/>
        <g stroke="#0c1426" stroke-width="1" opacity="0.4">
          <line x1="0" y1="12" x2="80" y2="12"/>
          <line x1="0" y1="25" x2="80" y2="25"/>
          <line x1="0" y1="38" x2="80" y2="38"/>
        </g>
        <circle cx="70" cy="6" r="3" fill="#34d399"/>
      </g>

      <g transform="translate(100, 60)">
        <rect x="0" y="0" width="80" height="50" rx="4" fill="url(#container3)" stroke="#a78bfa" stroke-width="1.5"/>
        <g stroke="#0c1426" stroke-width="1" opacity="0.4">
          <line x1="0" y1="12" x2="80" y2="12"/>
          <line x1="0" y1="25" x2="80" y2="25"/>
          <line x1="0" y1="38" x2="80" y2="38"/>
        </g>
        <circle cx="70" cy="6" r="3" fill="#34d399"/>
      </g>
    </g>
    <text x="90" y="130" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="700" fill="#7dd3fc" letter-spacing="2">CONTAINERS</text>
  </g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

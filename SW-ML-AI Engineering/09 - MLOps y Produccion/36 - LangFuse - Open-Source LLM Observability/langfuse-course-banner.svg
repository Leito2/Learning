<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="LangFuse Deep Dive Course Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="55%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#080f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#glow)"/>

  <rect x="60" y="44" width="180" height="30" rx="15" fill="rgba(255,255,255,0.06)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="78" y="64" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="2" fill="#38bdf8">CURSO COMPRIMIDO</text>

  <text x="60" y="130" font-family="ui-sans-serif, system-ui" font-size="48" font-weight="800" fill="#fff">LangFuse Deep Dive</text>

  <rect x="60" y="148" width="240" height="4" rx="2" fill="url(#accent)"/>

  <text x="60" y="162" font-family="ui-sans-serif, system-ui" font-size="17" font-weight="500" fill="#cbd5e1">Open-source traces · evaluations · prompts · online scoring</text>

  <text x="60" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8"># Self-hosted LLM observability para producción regulated</text>

  <text x="60" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">from </text>
    <text x="95" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">langfuse </text>
    <text x="158" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">import </text>
    <text x="207" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">Langfuse, observe</text>
    <text x="60" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">lf = </text>
    <text x="95" y="242" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">Langfuse(public_key=...)</text>
    <text x="60" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#f472b6">@</text>
    <text x="67" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">observe</text>
    <text x="116" y="264" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">()</text>
    <text x="60" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#fbbf24">def </text>
    <text x="88" y="286" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0">agent_run(query: str):</text>
    <text x="60" y="308" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8">    return </text>
    <text x="137" y="308" font-family="ui-monospace, monospace" font-size="13" fill="#a78bfa">openai.chat(query)</text>

  <g transform="translate(1020,170)"><circle cx="60" cy="60" r="58" fill="url(#iconGrad)" stroke="rgba(255,255,255,0.18)"/><g stroke="#fff" stroke-width="3" fill="none"><circle cx="60" cy="60" r="34"/><circle cx="60" cy="60" r="20"/></g></g>

  <g><rect x="60" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="71" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">6 notas</text></g>
    <g><rect x="141" y="304" width="71" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="152" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">English</text></g>
    <g><rect x="222" y="304" width="99" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="233" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Self-hosted</text></g>
    <g><rect x="331" y="304" width="134" height="24" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/><text x="342" y="321" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="600" fill="#e2e8f0">Compliance-ready</text></g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>

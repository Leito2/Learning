<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Bienvenida al Curso Markdown">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <linearGradient id="codeStripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.04"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.85" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <g stroke="#1f2a44" stroke-width="1" opacity="0.55">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>

  <g transform="translate(60, 60)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" letter-spacing="3">CURSO COMPRIMIDO</text>

    <text x="0" y="70" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" fill="#f8fafc">Markdown</text>

    <rect x="0" y="92" width="120" height="6" fill="url(#accent)" rx="3"/>

    <text x="0" y="140" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">El lenguaje que da estructura a tu conocimiento</text>

    <text x="0" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#64748b">// John Gruber · 2004 — texto plano que se convierte en documento</text>
  </g>

  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="1080" height="64" rx="10" fill="url(#codeStripe)" stroke="#1e3a5f" stroke-width="1"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#e2e8f0">
      <text x="20" y="28"><tspan fill="#7dd3fc">#</tspan> Header <tspan fill="#64748b">    </tspan>  <tspan fill="#fbbf24">**</tspan><tspan>bold</tspan><tspan fill="#fbbf24">**</tspan> <tspan fill="#64748b">  </tspan>  <tspan fill="#a78bfa">_</tspan><tspan>italic</tspan><tspan fill="#a78bfa">_</tspan> <tspan fill="#64748b">  </tspan>  <tspan fill="#34d399">`</tspan><tspan>code</tspan><tspan fill="#34d399">`</tspan></text>
      <text x="20" y="52"><tspan fill="#f472b6">[</tspan><tspan>link</tspan><tspan fill="#f472b6">](url)</tspan> <tspan fill="#64748b">  </tspan>  <tspan fill="#fb7185">&gt;</tspan> quote <tspan fill="#64748b">  </tspan>  <tspan fill="#fb923c">-</tspan> list <tspan fill="#64748b">  </tspan>  <tspan fill="#22d3ee">|</tspan> table <tspan fill="#22d3ee">|</tspan> <tspan fill="#64748b">  </tspan>  <tspan fill="#a3e635">---</tspan></text>
    </g>
  </g>

  <g transform="translate(60, 200)">
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600">
      <g transform="translate(0,0)">
        <rect x="0" y="0" width="86" height="30" rx="15" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.5"/>
        <text x="43" y="20" text-anchor="middle" fill="#7dd3fc">5 notas</text>
      </g>
      <g transform="translate(96,0)">
        <rect x="0" y="0" width="86" height="30" rx="15" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.5"/>
        <text x="43" y="20" text-anchor="middle" fill="#c4b5fd">Español</text>
      </g>
      <g transform="translate(192,0)">
        <rect x="0" y="0" width="106" height="30" rx="15" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-opacity="0.5"/>
        <text x="53" y="20" text-anchor="middle" fill="#6ee7b7">Obsidian-ready</text>
      </g>
      <g transform="translate(308,0)">
        <rect x="0" y="0" width="106" height="30" rx="15" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-opacity="0.5"/>
        <text x="53" y="20" text-anchor="middle" fill="#fcd34d">GitHub-flavored</text>
      </g>
    </g>
  </g>

  <g transform="translate(1090, 60)" opacity="0.95">
    <g transform="rotate(-8)">
      <rect x="-40" y="-40" width="80" height="80" rx="14" fill="#0b1220" stroke="url(#accent)" stroke-width="2.5"/>
      <text x="0" y="14" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">M</text>
      <text x="0" y="38" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600" fill="#7dd3fc">▼</text>
    </g>
  </g>

  <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
</svg>
